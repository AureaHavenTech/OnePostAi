name: Deploy to Production
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build --no-lint
      - name: Deploy to Vercel
        run: |
          npm i -g vercel
          vercel deploy --prebuilt --yes --token=${{ secrets.VERCEL_TOKEN }}
