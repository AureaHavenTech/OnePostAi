<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e0d4"/>
      <stop offset="100%" stop-color="#dcd0be"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="50%" stop-color="#dbc08a"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="20" flood-color="#12121a" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- Decorative rings -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#c9a96e" stroke-width="2.5" opacity="0.1"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="#c9a96e" stroke-width="1.5" opacity="0.08"/>
  <!-- Dark inner circle -->
  <circle cx="256" cy="256" r="156" fill="#12121a"/>
  <!-- Gold border -->
  <circle cx="256" cy="256" r="156" stroke="url(#goldGrad)" stroke-width="4" opacity="0.5"/>
  <!-- O monogram -->
  <path d="M190 290 C190 218, 214 184, 256 184 C298 184, 322 218, 322 290 C322 346, 304 370, 256 370 C208 370, 190 346, 290Z"
        stroke="url(#goldGrad)" stroke-width="12" fill="none"/>
  <path d="M210 276 C210 230, 228 204, 256 204 C284 204, 302 230, 302 276 C302 314, 290 334, 256 334 C222 334, 210 314, 210 276Z"
        stroke="url(#goldGrad)" stroke-width="4.5" opacity="0.5" stroke-dasharray="6 8"/>
  <!-- Sparkle -->
  <path d="M286 150 L286 135 M278 142.5 L293 142.5" stroke="#c9a96e" stroke-width="5" stroke-linecap="round"/>
  <!-- Accent dots -->
  <circle cx="192" cy="348" r="7" fill="#c9a96e" opacity="0.35"/>
  <circle cx="330" cy="300" r="5" fill="#c9a96e" opacity="0.25"/>
  <circle cx="230" cy="178" r="4" fill="#c9a96e" opacity="0.2"/>
  <!-- Brand initials -->
  <text x="256" y="464" font-family="'Inter', sans-serif" font-size="36" font-weight="600" fill="#12121a" opacity="0.25" text-anchor="middle" letter-spacing="4">OP</text>
</svg>