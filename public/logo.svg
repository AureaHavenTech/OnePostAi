<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a0a0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e8c4c4" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" fill="url(#roseGrad)" stroke="url(#goldGrad)" stroke-width="1.5"/>
  
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="75" stroke="url(#goldGrad)" stroke-width="0.8" stroke-dasharray="4 4" fill="none"/>
  
  <!-- Stylized O monogram -->
  <path d="M68 120 C68 85, 85 68, 100 68 C115 68, 132 85, 132 120 C132 145, 120 155, 100 155 C80 155, 68 145, 68 120Z" 
        fill="none" stroke="url(#goldGrad)" stroke-width="3.5"/>
  
  <!-- O inner highlight -->
  <path d="M82 115 C82 92, 92 82, 100 82 C108 82, 118 92, 118 115 C118 132, 110 138, 100 138 C90 138, 82 132, 82 115Z" 
        fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.7"/>
  
  <!-- Accent dot - top right -->
  <circle cx="118" cy="72" r="3" fill="url(#goldGrad)"/>
  
  <!-- Accent dot - bottom left -->
  <circle cx="82" cy="138" r="2" fill="#d4a0a0" opacity="0.8"/>
  
  <!-- Subtle sparkle top right -->
  <path d="M125 60 L125 56 M123 58 L127 58" stroke="url(#goldGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
</svg>