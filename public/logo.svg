<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="50%" stop-color="#dbc08a"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#1e1e2a"/>
    </linearGradient>
  </defs>

  <!-- Icon: Stylized O with sparkle -->
  <g transform="translate(18, 65)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="44" fill="#e8e0d4" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.4"/>
    <!-- Inner dark ring -->
    <circle cx="0" cy="0" r="37" fill="#12121a"/>
    <!-- Gold O monogram -->
    <path d="M-18 10 C-18 -12, -8 -24, 0 -24 C8 -24, 18 -12, 18 10 C18 26, 10 32, 0 32 C-10 32, -18 26, -18 10Z"
          stroke="url(#goldGrad)" stroke-width="3.5" fill="none"/>
    <!-- O inner highlight -->
    <path d="M-10 8 C-10 -6, -4 -14, 0 -14 C4 -14, 10 -6, 10 8 C10 18, 5 22, 0 22 C-5 22, -10 18, -10 8Z"
          stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5" stroke-dasharray="2 3"/>
    <!-- Sparkle -->
    <path d="M10 -28 L10 -33 M7.5 -30.5 L12.5 -30.5" stroke="url(#goldGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="-22" cy="-30" r="2.5" fill="#c9a96e" opacity="0.6"/>
    <circle cx="22" cy="28" r="2" fill="#c9a96e" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(88, 72)">
    <!-- "OnePost" -->
    <text x="0" y="0" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" font-size="44" font-weight="700" fill="#12121a" letter-spacing="0.5">
      One<tspan fill="#c9a96e" font-style="italic">Post</tspan>
    </text>

    <!-- "AI" -->
    <text x="0" y="30" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="600" fill="#c9a96e" letter-spacing="4">
      AI
    </text>

    <!-- Tagline -->
    <text x="70" y="30" font-family="'Inter', -apple-system, sans-serif" font-size="10" fill="#7a7a8a" font-weight="400" letter-spacing="0.8">
      content. automated.
    </text>
  </g>
</svg>