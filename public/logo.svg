<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="100%" height="100%">
  <defs>
    <!-- Premium Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8883a" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#f5e6a3" />
    </linearGradient>
    <!-- Dark gradient for the icon background -->
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a3a" />
      <stop offset="100%" stop-color="#1a1a2a" />
    </linearGradient>
    <!-- Subtle glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle - dark gray -->
  <circle cx="36" cy="40" r="32" fill="url(#darkGrad)" stroke="url(#goldGrad)" stroke-width="1.5" />
  
  <!-- Overlapping OP Monogram - elegant, feminine -->
  <!-- O letter - large gold circle -->
  <ellipse cx="33" cy="40" rx="14" ry="16" fill="none" stroke="url(#goldGrad)" stroke-width="3" filter="url(#glow)" opacity="0.9"/>
  
  <!-- P letter - elegant gold -->
  <path d="M43 24 L43 56" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.95"/>
  <path d="M43 24 C43 24, 56 24, 56 34 C56 44, 43 44, 43 44" 
        fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.95"/>
  
  <!-- Small diamond accent -->
  <polygon points="36,28 38,32 36,36 34,32" fill="url(#goldGrad)" opacity="0.7"/>
  
  <!-- Brand name - ONE -->
  <text x="82" y="34" font-family="'Playfair Display', Georgia, serif" font-size="26" font-weight="700" fill="#e8e0d4" letter-spacing="4">ONE</text>
  <!-- Brand name - POST -->
  <text x="82" y="50" font-family="'Playfair Display', Georgia, serif" font-size="10" font-weight="400" fill="#a09080" letter-spacing="6">POST</text>
  <!-- Tagline - AI -->
  <text x="82" y="66" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="300" fill="url(#goldGrad)" letter-spacing="8">AI</text>
  <!-- Small decorative gold dot -->
  <circle cx="172" cy="34" r="2" fill="url(#goldGrad)" opacity="0.5" />
</svg>