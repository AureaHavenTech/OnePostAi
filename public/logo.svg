<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eab308"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Butterfly Icon -->
  <g transform="translate(18, 60)">
    <!-- Left wing top -->
    <path d="M0 0 C-8,-18 -28,-22 -30,-8 C-32,2 -20,8 -12,10 C-8,11 -4,10 0,8 Z"
          fill="url(#goldGrad)" opacity="0.9"/>
    <!-- Left wing bottom -->
    <path d="M0 8 C-6,10 -14,16 -18,24 C-20,28 -16,30 -12,28 C-6,24 -2,16 0,10 Z"
          fill="url(#pinkGrad)" opacity="0.85"/>
    <!-- Right wing top -->
    <path d="M0 0 C8,-18 28,-22 30,-8 C32,2 20,8 12,10 C8,11 4,10 0,8 Z"
          fill="url(#goldGrad)" opacity="0.9"/>
    <!-- Right wing bottom -->
    <path d="M0 8 C6,10 14,16 18,24 C20,28 16,30 12,28 C6,24 2,16 0,10 Z"
          fill="url(#pinkGrad)" opacity="0.85"/>
    <!-- Body -->
    <ellipse cx="0" cy="8" rx="2" ry="10" fill="#2d2a24" opacity="0.8"/>
    <!-- Body highlight -->
    <ellipse cx="0" cy="6" rx="0.8" ry="4" fill="#eab308" opacity="0.4"/>
    <!-- Sparkles around butterfly -->
    <text x="18" y="-18" font-size="8" fill="#eab308" opacity="0.6">✦</text>
    <text x="-24" y="-16" font-size="6" fill="#f472b6" opacity="0.5">✦</text>
    <text x="24" y="30" font-size="5" fill="#eab308" opacity="0.4">✦</text>
  </g>

  <!-- Wordmark -->
  <g transform="translate(68, 68)">
    <!-- "OnePost" -->
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#2d2a24" letter-spacing="1">
      One<tspan fill="url(#pinkGrad)" font-style="italic">Post</tspan>
    </text>

    <!-- "AI" -->
    <text x="0" y="32" font-family="'Trebuchet MS', Arial, sans-serif" font-size="24" font-weight="700" fill="#eab308" letter-spacing="3">
      AI
    </text>

    <!-- Tagline -->
    <text x="72" y="32" font-family="Georgia, serif" font-size="11" fill="#a09880" font-style="italic" letter-spacing="0.5">
      content. automated.
    </text>
  </g>
</svg>
