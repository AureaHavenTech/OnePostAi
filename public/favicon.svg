<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8883a" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#f5e6a3" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a3a" />
      <stop offset="100%" stop-color="#1a1a2a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="36" cy="36" r="34" fill="url(#darkGrad)" stroke="url(#goldGrad)" stroke-width="2" />
  <!-- O letter -->
  <ellipse cx="33" cy="36" rx="13" ry="15" fill="none" stroke="url(#goldGrad)" stroke-width="3" filter="url(#glow)" opacity="0.9"/>
  <!-- P letter -->
  <path d="M42 21 L42 51" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.95"/>
  <path d="M42 21 C42 21, 55 21, 55 31 C55 41, 42 41, 42 41" 
        fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.95"/>
  <!-- Small diamond -->
  <polygon points="36,24 38,28 36,32 34,28" fill="url(#goldGrad)" opacity="0.7"/>
</svg>