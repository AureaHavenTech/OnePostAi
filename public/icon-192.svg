<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcf9f2"/>
      <stop offset="100%" style="stop-color:#f8f0e0"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eab308"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <!-- Subtle shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#2d2a24" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect x="0" y="0" width="192" height="192" rx="40" ry="40" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Decorative ring -->
  <circle cx="96" cy="96" r="68" fill="none" stroke="#eab308" stroke-width="1.5" opacity="0.15"/>

  <!-- Butterfly Icon Centered -->
  <g transform="translate(96, 92)">
    <!-- Left wing top -->
    <path d="M0 0 C-12,-26 -38,-32 -42,-12 C-44,4 -28,12 -18,14 C-12,15 -6,14 0,12 Z"
          fill="url(#goldGrad)" opacity="0.9"/>
    <!-- Left wing bottom -->
    <path d="M0 12 C-9,14 -20,22 -26,36 C-28,42 -22,44 -16,40 C-8,34 -3,22 0,14 Z"
          fill="url(#pinkGrad)" opacity="0.85"/>
    <!-- Right wing top -->
    <path d="M0 0 C12,-26 38,-32 42,-12 C44,4 28,12 18,14 C12,15 6,14 0,12 Z"
          fill="url(#goldGrad)" opacity="0.9"/>
    <!-- Right wing bottom -->
    <path d="M0 12 C9,14 20,22 26,36 C28,42 22,44 16,40 C8,34 3,22 0,14 Z"
          fill="url(#pinkGrad)" opacity="0.85"/>
    <!-- Body -->
    <ellipse cx="0" cy="12" rx="3" ry="14" fill="#2d2a24" opacity="0.75"/>
    <!-- Body highlight -->
    <ellipse cx="0" cy="9" rx="1.2" ry="6" fill="#eab308" opacity="0.35"/>
    <!-- Antennae -->
    <path d="M-2,-2 C-6,-12 -12,-18 -16,-22" fill="none" stroke="#eab308" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M2,-2 C6,-12 12,-18 16,-22" fill="none" stroke="#eab308" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <!-- Antennae tips -->
    <circle cx="-16" cy="-22" r="2" fill="#f472b6" opacity="0.7"/>
    <circle cx="16" cy="-22" r="2" fill="#f472b6" opacity="0.7"/>
  </g>

  <!-- Sparkle accents -->
  <g transform="translate(96, 96)">
    <!-- Top sparkle -->
    <text x="0" y="-52" font-size="14" fill="#eab308" opacity="0.4" text-anchor="middle">✦</text>
    <!-- Right sparkle -->
    <text x="48" y="0" font-size="10" fill="#f472b6" opacity="0.35" text-anchor="middle">✦</text>
    <!-- Bottom left sparkle -->
    <text x="-40" y="40" font-size="8" fill="#eab308" opacity="0.3" text-anchor="middle">✦</text>
  </g>

  <!-- Brand initial -->
  <text x="96" y="170" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#2d2a24" opacity="0.5" text-anchor="middle" letter-spacing="1">OP</text>
</svg>