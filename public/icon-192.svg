<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e0d4"/>
      <stop offset="100%" stop-color="#dcd0be"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="50%" stop-color="#dbc08a"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#12121a" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect x="0" y="0" width="192" height="192" rx="42" ry="42" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- Decorative ring -->
  <circle cx="96" cy="96" r="70" fill="none" stroke="#c9a96e" stroke-width="1.5" opacity="0.15"/>
  <!-- Dark inner circle -->
  <circle cx="96" cy="96" r="58" fill="#12121a"/>
  <!-- Gold border -->
  <circle cx="96" cy="96" r="58" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>
  <!-- O monogram -->
  <path d="M72 110 C72 82, 82 68, 96 68 C110 68, 120 82, 120 110 C120 130, 110 138, 96 138 C82 138, 72 130, 72 110Z"
        stroke="url(#goldGrad)" stroke-width="5" fill="none"/>
  <path d="M80 104 C80 86, 86 76, 96 76 C106 76, 112 86, 112 104 C112 118, 106 126, 96 126 C86 126, 80 118, 80 104Z"
        stroke="url(#goldGrad)" stroke-width="2" opacity="0.5" stroke-dasharray="3 4"/>
  <!-- Sparkle -->
  <path d="M108 58 L108 50 M104 54 L112 54" stroke="#c9a96e" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="72" cy="130" r="3.5" fill="#c9a96e" opacity="0.4"/>
  <circle cx="124" cy="112" r="2" fill="#c9a96e" opacity="0.3"/>
  <!-- Brand initials -->
  <text x="96" y="172" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#12121a" opacity="0.3" text-anchor="middle" letter-spacing="2">OP</text>
</svg>